name: Build FongMi TV APK
on:
  push:
    branches: [ main, release ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装依赖工具
        run: |
          sudo apt update && sudo apt install -y openjdk-17-jdk wget unzip

      - name: 配置 Android SDK（标准目录结构）
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools/latest
          wget https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O cmdline-tools.zip
          unzip cmdline-tools.zip -d temp-tools
          mv temp-tools/cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/
          rm -rf temp-tools cmdline-tools.zip

          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          yes '' | sdkmanager --licenses || true
          sdkmanager "platforms;android-33" "build-tools;33.0.2" "extras;android;m2repository" "extras;google;m2repository"

      - name: 配置全局环境变量
        run: |
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: 赋予 gradlew 执行权限
        run: chmod +x ./gradlew

      - name: 不修改项目 Gradle 配置（避免破坏原项目）
        run: |
          # 只添加阿里云镜像，不重写 build.gradle
          sed -i '/repositories {/a\        maven { url "https://maven.aliyun.com/repository/public" }' build.gradle
          sed -i '/repositories {/a\        maven { url "https://maven.aliyun.com/repository/google" }' build.gradle

      - name: 编译 APK 并输出详细日志（关键：--debug 模式）
        run: |
          ./gradlew clean assembleDebug --no-daemon --debug --stacktrace
        env:
          GRADLE_OPTS: "-Xmx6g"
          ANDROID_HOME: $HOME/android-sdk

      - name: 上传 APK 产物（若编译成功）
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: FongMi-TV-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
