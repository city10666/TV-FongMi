name: Build FongMi TV

on:
  push:
    branches: [ release, main ]
  pull_request:
    branches: [ release ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 1. 检出代码
      uses: actions/checkout@v4
      with:
        ref: release  # 明确指定release分支
    
    - name: 2. 设置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: 3. 设置 Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 33
        build-tools-version: '33.0.0'
        ndk-version: '25.1.8937393'
    
    - name: 4. 分析项目结构
      run: |
        echo "=== 项目结构分析 ==="
        echo "根目录内容:"
        ls -la
        
        echo -e "\n=== 查找关键文件 ==="
        # 查找所有可能的构建文件
        find . -name "*.gradle" -o -name "*.gradle.kts" | sort
        find . -name "gradle-wrapper.properties" | head -5
        
        echo -e "\n=== 检查Android源码 ==="
        find . -name "AndroidManifest.xml" | head -10
        find . -path "*/src/*" -type f | head -20
        
        echo -e "\n=== Gradle Wrapper信息 ==="
        if [ -f "gradle/wrapper/gradle-wrapper.properties" ]; then
          echo "Gradle Wrapper配置:"
          cat gradle/wrapper/gradle-wrapper.properties
        else
          echo "⚠️ 未找到gradle-wrapper.properties"
          # 尝试在其他位置查找
          find . -name "gradle-wrapper.properties" 2>/dev/null
        fi
    
    - name: 5. 创建必要的构建文件（如果缺失）
      run: |
        # 如果缺少顶级build.gradle，创建一个基础版本
        if [ ! -f "build.gradle" ] && [ ! -f "build.gradle.kts" ]; then
          echo "创建基础 build.gradle..."
          cat > build.gradle << 'EOF'
// 顶级构建配置
buildscript {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://jitpack.io' }
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.0.0'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://jitpack.io' }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
EOF
        fi
        
        # 如果缺少settings.gradle，创建一个
        if [ ! -f "settings.gradle" ] && [ ! -f "settings.gradle.kts" ]; then
          echo "创建 settings.gradle..."
          cat > settings.gradle << 'EOF'
pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

dependencyResolutionManagement {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://jitpack.io' }
    }
}

rootProject.name = 'TV-FongMi'
include ':app'
EOF
        fi
        
        # 确保gradlew有执行权限
        if [ -f "gradlew" ]; then
          chmod +x gradlew
        fi
    
    - name: 6. 检查并修复app/build.gradle
      run: |
        if [ ! -f "app/build.gradle" ] && [ ! -f "app/build.gradle.kts" ]; then
          echo "创建基础app/build.gradle..."
          mkdir -p app
          cat > app/build.gradle << 'EOF'
plugins {
    id 'com.android.application'
}

android {
    namespace 'com.fongmi.android.tv'
    compileSdk 33
    
    defaultConfig {
        applicationId "com.fongmi.android.tv"
        minSdk 21
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }
    
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.9.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
}
EOF
        else
          echo "app/build.gradle已存在"
          if [ -f "app/build.gradle" ]; then
            echo "前50行内容:"
            head -50 app/build.gradle
          fi
        fi
    
    - name: 7. 创建local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "ndk.dir=$ANDROID_NDK" >> local.properties
    
    - name: 8. 尝试构建
      run: |
        echo "=== 尝试构建 ==="
        
        # 先检查gradlew是否存在
        if [ -f "gradlew" ]; then
          echo "使用gradlew构建..."
          ./gradlew tasks --all || true
          
          # 尝试不同的构建任务
          echo -e "\n尝试常见构建任务:"
          for task in "assemble" "assembleRelease" "assembleDebug" "build" ":app:assemble"; do
            echo -e "\n=== 尝试: ./gradlew $task ==="
            ./gradlew $task --stacktrace || echo "任务 $task 失败"
          done
        else
          echo "❌ gradlew不存在，无法构建"
          
          # 尝试使用gradle命令
          echo "尝试直接使用gradle..."
          gradle tasks --all || true
        fi
    
    - name: 9. 查找生成的APK
      if: always()
      run: |
        echo "=== 查找构建输出 ==="
        find . -name "*.apk" -type f 2>/dev/null | while read file; do
          echo "找到APK: $file"
          ls -la "$file"
        done
        
        # 列出构建目录
        echo -e "\n=== 构建输出目录 ==="
        find . -type d -name "outputs" -o -name "build" | sort | while read dir; do
          echo "目录: $dir"
          find "$dir" -maxdepth 2 -type f 2>/dev/null | head -10
        done
    
    - name: 10. 上传APK制品
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: FongMi-TV-APK
        path: |
          **/build/outputs/apk/**/*.apk
          **/build/outputs/bundle/**/*.aab
        if-no-files-found: warn
        retention-days: 30
    
    - name: 11. 上传构建日志
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Build-Logs
        path: |
          **/build/reports/
          **/build/outputs/logs/
        if-no-files-found: ignore
        retention-days: 7
