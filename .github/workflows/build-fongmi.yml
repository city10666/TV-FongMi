name: Build FongMi TV APK
on:
  push:
    branches: [ main, release ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装系统级 Android SDK（原生方案，无坑）
        run: |
          # 安装依赖工具
          sudo apt update && sudo apt install -y wget unzip openjdk-17-jdk
          # 下载 cmdline-tools（用于管理 SDK）
          wget https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O cmdline-tools.zip
          unzip cmdline-tools.zip -d $HOME/android-sdk
          # 配置 SDK 环境变量
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/bin:$ANDROID_HOME/platform-tools
          # 同意所有 SDK 授权
          yes | sdkmanager --licenses
          # 安装指定版本的 SDK 和构建工具（单行写法，避免格式错误）
          sdkmanager "platforms;android-33" "build-tools;33.0.2" "extras;android;m2repository" "extras;google;m2repository"

      - name: 配置环境变量全局生效
        run: |
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: 赋予 gradlew 执行权限
        run: chmod +x ./gradlew

      - name: 强制替换 Maven 镜像（解决依赖下载）
        run: |
          # 重写根 build.gradle
          cat > build.gradle << EOF
          buildscript {
              repositories {
                  maven { url 'https://maven.aliyun.com/repository/google' }
                  maven { url 'https://maven.aliyun.com/repository/public' }
                  maven { url 'https://maven.aliyun.com/repository/gradle-plugin' }
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.4.2'
              }
          }
          allprojects {
              repositories {
                  maven { url 'https://maven.aliyun.com/repository/google' }
                  maven { url 'https://maven.aliyun.com/repository/public' }
                  maven { url 'https://maven.aliyun.com/repository/jcenter' }
              }
          }
          EOF
          # 强制对齐 app 模块的编译版本
          sed -i 's/compileSdkVersion .*/compileSdkVersion 33/' app/build.gradle
          sed -i 's/buildToolsVersion .*/buildToolsVersion "33.0.2"/' app/build.gradle

      - name: 编译 Release APK
        run: |
          ./gradlew clean assembleRelease --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Xmx4g"

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: FongMi-TV-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
