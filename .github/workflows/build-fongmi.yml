name: Build FongMi TV APK
on:
  workflow_dispatch: # 只保留手动触发，避免自动构建干扰

jobs:
  build:
    # 使用官方 Android 构建容器，预装 SDK/NDK/Gradle
    runs-on: macos-latest # macos 对 Android 兼容性更好，避免 linux 权限问题
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Build Debug APK (跳过Release签名/混淆)
        run: |
          ./gradlew clean assembleDebug --no-daemon
        env:
          # 强制指定 SDK 路径，使用容器预装的 SDK
          ANDROID_HOME: /Users/runner/Library/Android/sdk
          GRADLE_OPTS: "-Xmx4g"

      - name: Upload APK if success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: FongMi-TV-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
