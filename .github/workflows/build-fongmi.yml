name: Build FongMi TV APK
on:
  workflow_dispatch: # 仅手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 1. 重置系统环境（修复 PATH 根本问题）
        run: |
          echo "PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" >> $GITHUB_ENV
          /bin/echo "基础命令验证："
          /bin/ls --version
          /bin/sed --version
          /bin/chmod --version

      - name: 2. 安装 Python 3.10
        run: |
          sudo apt update
          sudo apt install -y software-properties-common
          sudo add-apt-repository ppa:deadsnakes/ppa -y
          sudo apt update
          sudo apt install -y python3.10 python3.10-venv python3.10-dev
          sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.10 1
          python3 --version

      - name: 3. 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: 4. 配置 Android SDK
        run: |
          ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools/latest
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV

          /usr/bin/wget https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O cmdline-tools.zip
          /usr/bin/unzip cmdline-tools.zip -d temp-tools
          /bin/mv temp-tools/cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/
          /bin/rm -rf temp-tools cmdline-tools.zip

          SDKMANAGER=$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager

          /bin/echo "y
          y
          y
          y
          y
          y
          y
          y
          y
          y" | $SDKMANAGER --licenses

          $SDKMANAGER "platforms;android-33" "build-tools;33.0.2" "extras;android;m2repository" "extras;google;m2repository"

          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      - name: 5. 配置 Python 环境变量
        run: |
          echo "PYTHON_EXECUTABLE=/usr/bin/python3.10" >> $GITHUB_ENV
          echo "PATH=/usr/bin/python3.10:\$PATH" >> $GITHUB_ENV

      - name: 6. 授予 gradlew 执行权限
        run: |
          /bin/chmod +x ./gradlew

      - name: 7. 修改项目配置文件（更健壮的方案）
        run: |
          # --- 检查并修改根项目 build.gradle ---
          if [ -f "build.gradle" ]; then
            echo "找到根项目 build.gradle，添加阿里云镜像..."
            # 检查是否已存在阿里云镜像，避免重复添加
            if ! /bin/grep -q "maven.aliyun.com" build.gradle; then
              /bin/sed -i '/repositories {/a\        maven { url "https://maven.aliyun.com/repository/public" }' build.gradle
              /bin/sed -i '/repositories {/a\        maven { url "https://maven.aliyun.com/repository/google" }' build.gradle
            else
              echo "阿里云镜像已存在，跳过添加。"
            fi
          else
            echo "警告：根项目 build.gradle 文件未找到。"
          fi

          # --- 检查并修改 app 模块 build.gradle ---
          if [ -f "app/build.gradle" ]; then
            echo "找到 app/build.gradle，配置 Chaquopy..."
            # 检查是否存在 chaquopy 块
            if /bin/grep -q "chaquopy {" app/build.gradle; then
              echo "找到 chaquopy 配置块，设置 Python 版本..."
              # 使用更简单的 sed 命令来修改或添加 pythonVersion
              /bin/sed -i '/chaquopy {/a\        pythonVersion "3.10"' app/build.gradle
              
              # 为 pip 添加国内镜像（这是一个单独的命令）
              /bin/sed -i '/pythonVersion "3.10"/a\        pip {\n            options "--index-url", "https://mirrors.aliyun.com/pypi/simple/"\n        }' app/build.gradle
            else
              echo "警告：在 app/build.gradle 中未找到 'chaquopy {' 块。"
            fi
          else
            echo "错误：app/build.gradle 文件未找到！构建可能失败。"
          fi

          # 验证修改（可选，用于调试）
          echo "--- 验证 app/build.gradle 配置 ---"
          if [ -f "app/build.gradle" ]; then
            /bin/cat app/build.gradle | /bin/grep -A 10 "chaquopy {"
          fi

      - name: 8. 构建 Debug APK
        run: |
          ./gradlew clean assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Xmx4g"
          PYTHONPATH: /usr/bin/python3.10

      - name: 9. 上传 APK 产物
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: FongMi-TV-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
