name: Build FongMi TV APK
on:
  push:
    branches: [ main, release ]  # 适配你的分支
  workflow_dispatch:  # 手动触发开关

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 延长超时，避免依赖下载中断

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle  # 缓存gradle依赖，加速构建

      - name: 配置 Android SDK（无需模拟器）
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          build-tools: 33.0.2  # 指定存在的build-tools版本，避免自动下载出错
          # 只安装必要组件，不装系统镜像
          packages: |
            platforms;android-33
            build-tools;33.0.2
            extras;android;m2repository
            extras;google;m2repository

      - name: 赋予 gradlew 执行权限
        run: chmod +x ./gradlew

      - name: 替换 Maven 镜像（解决国内下载慢）
        run: |
          # 修改根目录build.gradle的仓库源
          sed -i '/repositories {/a\        maven { url "https://maven.aliyun.com/repository/public" }' build.gradle
          sed -i '/repositories {/a\        maven { url "https://maven.aliyun.com/repository/google" }' build.gradle
          sed -i '/repositories {/a\        maven { url "https://maven.aliyun.com/repository/gradle-plugin" }' build.gradle

      - name: 编译 Release APK
        run: ./gradlew clean assembleRelease --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Xmx2g"  # 分配2G内存，防止OOM

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: FongMi-TV-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
