name: Build FongMi TV APK
on:
  push:
    branches: [ main, release ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90  # 进一步延长超时，适配依赖下载

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 修复：使用新版 setup-android 正确参数
      - name: 配置 Android SDK（仅编译必需组件）
        uses: android-actions/setup-android@v3
        with:
          # 仅声明需要的包，不写 api-level/build-tools
          packages: |
            platforms;android-33
            build-tools;33.0.2
            extras;android;m2repository
            extras;google;m2repository
          accept-android-sdk-licenses: true  # 自动同意授权

      - name: 赋予 gradlew 执行权限
        run: chmod +x ./gradlew

      # 关键：强制替换项目所有仓库为阿里云，解决依赖下载失败
      - name: 全局替换 Maven 镜像
        run: |
          # 修改根项目 build.gradle
          cat > build.gradle << EOF
          buildscript {
              repositories {
                  maven { url 'https://maven.aliyun.com/repository/google' }
                  maven { url 'https://maven.aliyun.com/repository/public' }
                  maven { url 'https://maven.aliyun.com/repository/gradle-plugin' }
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.4.2'
              }
          }

          allprojects {
              repositories {
                  maven { url 'https://maven.aliyun.com/repository/google' }
                  maven { url 'https://maven.aliyun.com/repository/public' }
                  maven { url 'https://maven.aliyun.com/repository/jcenter' }
              }
          }
          EOF

          # 修改 app 模块 build.gradle 的 compileSdk 和 buildTools 版本（强制匹配 SDK）
          sed -i 's/compileSdkVersion .*/compileSdkVersion 33/' app/build.gradle
          sed -i 's/buildToolsVersion .*/buildToolsVersion "33.0.2"/' app/build.gradle

      - name: 编译 Release APK
        run: |
          ./gradlew clean assembleRelease --no-daemon --info  # --info 输出详细日志，方便排查
        env:
          GRADLE_OPTS: "-Xmx4g"  # 分配4G内存，避免内存不足
          ANDROID_HOME: ${{ github.workspace }}/android-sdk

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: FongMi-TV-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
