name: Build FongMi TV APK
on:
  push:
    branches: [ main, release ]  # 兼容main和release分支
  workflow_dispatch:  # 强制保留手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 延长超时时间，防止依赖下载慢

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 关键：直接用官方Android容器，避免手动配置SDK出错
      - name: 使用Android编译环境
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33  # 降低版本，兼容性更高
          script: |
            chmod +x ./gradlew
            ./gradlew clean assembleRelease --no-daemon

      - name: 上传APK产物
        uses: actions/upload-artifact@v4
        with:
          name: FongMi-TV-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
