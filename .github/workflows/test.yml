name: Build TV-FongMi APKs

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk

    steps:
      # 1️⃣ 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ 安装 JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 3️⃣ 安装 Android SDK（手动安装）
      - name: Install Android SDK
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          cd $ANDROID_SDK_ROOT/cmdline-tools
          curl -sSL https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -o cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          rm cmdline-tools.zip
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platforms;android-33" "build-tools;33.0.2" || true

      # 4️⃣ 接受 SDK License
      - name: Accept Android SDK Licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # 5️⃣ 缓存 Gradle
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # 6️⃣ 给 gradlew 授权
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 7️⃣ 设置 Java 17 编译选项
      - name: Set Java 17 compile options
        run: |
          echo "org.gradle.java.home=${JAVA_HOME}" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx2g --release 17" >> gradle.properties

      # 8️⃣ 独立构建模块，失败不停止
      - name: Build all modules (ignore failures)
        run: |
          modules=("app" "quickjs" "pyramid")
          for module in "${modules[@]}"; do
            if [ -d "./$module" ]; then
              echo "Building $module..."
              ./gradlew ":$module:clean" ":$module:assembleRelease" --stacktrace || echo "$module build failed, continue"
            else
              echo "Module $module does not exist, skipping"
            fi

      # 9️⃣ 打印构建失败日志
      - name: Print build logs
        if: failure()
        run: |
          echo "Some modules failed to build. Check logs above."

      # 🔟 收集 APK 文件
      - name: Collect all APKs
        run: |
          mkdir -p apks
          find ./app/build ./quickjs/build ./pyramid/build -type f -name "*.apk" -exec cp {} apks/ \;
          echo "Found APKs:"
          ls -l apks || echo "No APKs found"

      # 1️⃣1️⃣ 上传 APK
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: TV-FongMi-APKs
          path: apks
