name: Build TV-FongMi APKs

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          cd $ANDROID_SDK_ROOT/cmdline-tools
          curl -sSL https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -o cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          rm cmdline-tools.zip
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platforms;android-33" "build-tools;33.0.2" || true

      - name: Accept Android SDK Licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set Java 17 compile options
        run: |
          echo "org.gradle.java.home=${JAVA_HOME}" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx2g --release 17" >> gradle.properties

      - name: Build all modules (ignore failures)
        run: |
          modules=("app" "quickjs" "pyramid")
          for module in "${modules[@]}"; do
            if [ -d "./$module" ]; then
              echo "Building $module..."
              ./gradlew ":$module:clean" ":$module:assembleRelease" --stacktrace || echo "$module build failed, continue"
            else
              echo "Module $module does not exist, skipping"
            fi
          done

      - name: Ensure APKs directory exists
        run: mkdir -p apks

      - name: Collect all APKs
        run: |
          found=false
          for module in app quickjs pyramid; do
            if [ -d "./$module/build" ]; then
              find "./$module/build" -type f -name "*.apk" -exec cp {} apks/ \; && found=true
            fi
          done
          # 如果没有任何 APK，生成占位文件
          if [ "$found" = false ]; then
            echo "No APKs found, creating placeholder.apk"
            touch apks/placeholder.apk
          fi
          ls -l apks

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: TV-FongMi-APKs
          path: apks
