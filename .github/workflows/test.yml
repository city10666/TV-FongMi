name: Build APKs

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-apks:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: ${{ github.workspace }}/android-sdk
      JAVA_HOME: ${{ runner.tool_cache }}/java/17.0.8/x64
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2
        with:
          sdk-version: 33
          build-tools: 33.0.2
          cache: false

      - name: Accept licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: ./.gradle
          key: gradle-${{ github.sha }}
          restore-keys: gradle-

      - name: Build Modules
        run: |
          mkdir -p apks
          modules=("app" "quickjs" "pyramid")
          for module in "${modules[@]}"; do
            echo "==> Building $module"
            if ./gradlew :$module:clean :$module:assembleRelease > build_${module}.log 2>&1; then
              echo "$module build succeeded."
              find $module/build/outputs -name "*.apk" -exec cp {} apks/ \;
            else
              echo "$module build failed. See build_${module}.log"
              cp build_${module}.log apks/
            fi
          done

      - name: Upload APKs and logs
        uses: actions/upload-artifact@v4
        with:
          name: apks-and-logs
          path: apks/
