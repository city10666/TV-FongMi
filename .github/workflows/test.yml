name: Build TV-FongMi

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

    steps:
      # 1️⃣ 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ 安装 JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 3️⃣ 安装 Android SDK 并缓存
      - name: Set up Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: 33
          build-tools: 33.0.2
          cache: true

      # 4️⃣ 缓存 Gradle
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # 5️⃣ 给 gradlew 授权
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 6️⃣ 自动检测存在模块并构建
      - name: Build existing modules
        continue-on-error: true
        run: |
          modules=("app" "quickjs" "pyramid")
          for module in "${modules[@]}"; do
            if [ -d "./$module" ]; then
              echo "Building $module..."
              ./gradlew ":$module:clean" ":$module:assembleRelease" --stacktrace || echo "$module build failed, continue"
            else
              echo "Module $module does not exist, skipping"
            fi
          done

      # 7️⃣ 收集 APK 文件
      - name: Collect APKs
        id: collect
        run: |
          mkdir -p apks
          find ./app/build ./quickjs/build ./pyramid/build -type f -name "*.apk" -exec cp {} apks/ \;
          echo "Found APKs:"
          ls -l apks
          echo "apk_path=apks" >> $GITHUB_ENV

      # 8️⃣ 上传 APK
      - name: Upload APKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TV-FongMi-APKs
          path: ${{ env.apk_path }}
