name: Build TV-FongMi APK

on:
  push:
    branches: [ release, main, master ]
  pull_request:
    branches: [ release ]
  workflow_dispatch:  # 允许手动触发

env:
  JAVA_VERSION: '17'
  ANDROID_API: '21'  # Android 5.0+ (leanback通常需要更高版本)
  BUILD_TOOLS: '34.0.0'

jobs:
  build-leanback:
    runs-on: ubuntu-latest
    
    steps:
    - name: 1. 检出代码（包含子模块）
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: 2. 设置 JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
    
    - name: 3. 设置 Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: ${{ env.ANDROID_API }}
        build-tools-version: ${{ env.BUILD_TOOLS }}
        ndk-version: '26.1.10909125'  # 最新稳定版
    
    - name: 4. 验证项目结构
      run: |
        echo "检查关键文件..."
        ls -la
        echo "---"
        if [ -f "build.gradle" ]; then
          echo "✅ 找到 build.gradle"
        else
          echo "❌ 缺少 build.gradle"
          exit 1
        fi
        
        if [ -f "app/build.gradle" ]; then
          echo "✅ 找到 app/build.gradle"
        else
          echo "❌ 缺少 app/build.gradle"
          exit 1
        fi
        
        if [ -d "app/src" ]; then
          echo "✅ 找到 app/src 目录"
          find app/src -name "AndroidManifest.xml" | head -5
        fi
        
        echo "Gradle 版本:"
        cat gradle/wrapper/gradle-wrapper.properties | grep distributionUrl || true
    
    - name: 5. 配置构建环境
      run: |
        # 创建 local.properties（Android SDK 路径）
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "ndk.dir=$ANDROID_NDK" >> local.properties
        
        # 设置权限
        chmod +x gradlew
        
        # 如果是中国用户，可加速 Gradle 下载
        # sed -i 's|https\\://services.gradle.org|https\\://mirrors.cloud.tencent.com/gradle|g' gradle/wrapper/gradle-wrapper.properties
    
    - name: 6. 构建 Leanback 版本
      run: |
        # 清理并构建
        ./gradlew clean
        
        # 尝试构建不同的变体
        echo "尝试构建 leanbackRelease..."
        ./gradlew :app:assembleLeanbackRelease || echo "leanbackRelease 构建失败，尝试其他变体"
        
        # 如果失败，尝试通用构建
        if [ ! -f "app/build/outputs/apk/leanback/release/*.apk" ]; then
          echo "尝试构建通用版本..."
          ./gradlew assembleRelease
        fi
    
    - name: 7. 查找生成的 APK 文件
      id: find-apk
      run: |
        APK_PATH=$(find app/build/outputs -name "*.apk" -type f 2>/dev/null | head -1)
        if [ -n "$APK_PATH" ]; then
          echo "找到 APK: $APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          
          # 列出所有 APK
          echo "所有生成的 APK:"
          find app/build/outputs -name "*.apk" -type f
        else
          echo "未找到 APK 文件"
          echo "构建输出目录:"
          find app/build/outputs -type d
        fi
    
    - name: 8. 上传 APK 制品
      if: steps.find-apk.outputs.apk_path != ''
      uses: actions/upload-artifact@v4
      with:
        name: TV-FongMi-APK
        path: ${{ steps.find-apk.outputs.apk_path }}
        retention-days: 30
    
    - name: 9. 上传构建报告
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Build-Reports
        path: |
          app/build/reports/
          build/reports/
        retention-days: 7
