name: Build APK

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk
      ANDROID_SDK_ROOT: ${{ runner.tool_cache }}/android-sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip wget lib32stdc++6 lib32z1
          mkdir -p $ANDROID_SDK_ROOT
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip cmdline-tools.zip -d $ANDROID_SDK_ROOT
          mv $ANDROID_SDK_ROOT/cmdline-tools $ANDROID_SDK_ROOT/tools
          yes | $ANDROID_SDK_ROOT/tools/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses
          $ANDROID_SDK_ROOT/tools/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Inject compileSdkVersion and ndk filters
        run: |
          find ./app ./quickjs ./pyramid -name "build.gradle" -exec sed -i '/android {/a \
              compileSdkVersion 33\
              defaultConfig {\
                  ndk { abiFilters "armeabi-v7a","arm64-v8a","x86","x86_64" }\
              }' {} \;

      - name: Build all modules
        run: |
          ./gradlew clean assembleRelease --stacktrace --warning-mode all --continue
        continue-on-error: true

      - name: Upload APKs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: apk
          path: |
            app/build/outputs/**/*.apk
            quickjs/build/outputs/**/*.apk
            pyramid/build/outputs/**/*.apk
