name: Build TV-FongMi

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y unzip wget

      - name: Setup Android SDK
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          yes | $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses
          $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build all modules
        run: |
          mkdir -p build_logs
          modules=("app" "quickjs" "pyramid")
          for module in "${modules[@]}"; do
            if [ -d "$module" ]; then
              echo "==== Building $module module ===="
              ./gradlew :$module:clean :$module:assembleRelease > build_logs/$module.log 2>&1 || echo "$module module build failed, see build_logs/$module.log"
            else
              echo "==== $module module does not exist, skipping ===="
            fi
          done

      - name: Upload APKs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: apks
          path: |
            app/build/outputs/**/*.apk
            quickjs/build/outputs/**/*.apk
            pyramid/build/outputs/**/*.apk

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: build_logs
          path: build_logs/
