name: Build TV-FongMi

on:
  workflow_dispatch:  # 手动触发
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64
      ANDROID_HOME: /usr/local/android-sdk
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache Android SDK
        uses: actions/cache@v3
        with:
          path: ${{ env.ANDROID_HOME }}
          key: android-sdk-${{ runner.os }}-latest

      - name: Install Android SDK dependencies
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build app
        continue-on-error: true
        run: ./gradlew :app:clean :app:assembleRelease --stacktrace

      - name: Build quickjs
        continue-on-error: true
        run: ./gradlew :quickjs:clean :quickjs:assembleRelease --stacktrace

      - name: Build pyramid
        continue-on-error: true
        run: ./gradlew :pyramid:clean :pyramid:assembleRelease --stacktrace

      - name: Upload APKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apks
          path: |
            app/build/outputs/**/*.apk
            quickjs/build/outputs/**/*.apk
            pyramid/build/outputs/**/*.apk

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build_logs
          path: build_logs/
