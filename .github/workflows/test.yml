name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_API_LEVEL: 30
      ANDROID_BUILD_TOOLS_VERSION: 30.0.3
      ANDROID_NDK_VERSION: 25.2.9519653

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: 3.8

      - name: Download Android SDK cmdline-tools
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          curl -fsSL https://dl.google.com/android/repository/commandlinetools-linux-7302050_latest.zip -o sdk.zip
          unzip -q sdk.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          rm sdk.zip

      - name: Install SDK, Build Tools, NDK & Licenses
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS_VERSION}" \
            "ndk;${ANDROID_NDK_VERSION}"

      - name: Grant gradlew executable
        run: chmod +x ./gradlew

      - name: Force Gradle wrapper to 8.13
        run: ./gradlew wrapper --gradle-version 8.13

      - name: Build APK
        run: ./gradlew clean assembleRelease -Pandroid.overridePathCheck=true

      - name: Collect APK
        run: |
          mkdir -p apk
          find . -name "*.apk" -exec mv {} apk/ \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: apk/*.apk
