name: Build APK

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build All Modules APK
    runs-on: ubuntu-latest

    env:
      JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    # 设置 JDK
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 11

    # 设置 Android SDK（cmdline-tools）
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      with:
        api-level: 33
        build-tools: 33.0.2

    # 接受 SDK 许可
    - name: Accept SDK licenses
      run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses

    # 清理并构建 APK（包含所有模块）
    - name: Build APKs
      run: |
        chmod +x ./gradlew
        modules=("app" "quickjs" "pyramid")
        for module in "${modules[@]}"; do
          echo "Building $module..."
          ./gradlew :$module:clean :$module:assembleRelease || echo "$module build failed, continuing..."
        done

    # 上传 APK 作为 artifact
    - name: Upload APK artifacts
      uses: actions/upload-artifact@v4
      with:
        name: APKs
        path: |
          app/build/outputs/**/*.apk
          quickjs/build/outputs/**/*.apk
          pyramid/build/outputs/**/*.apk
